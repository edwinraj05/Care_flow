<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | CareFlow</title>
  <link rel="stylesheet" href="../public/style.css">
</head>
<body>
<div class="center">
  <div class="form-card">
    <div style="font-size:32px;margin-bottom:12px">🏥</div>
    <h2>Staff Login</h2>
    <p class="subtitle">Sign in with your staff credentials</p>
    <form action="../auth/login.php" method="POST">
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-input" name="role" required>
          <option value="">Select your role</option>
          <option value="doctor">Doctor</option>
          <option value="reception">Receptionist</option>
          <option value="pharmacist">Pharmacist</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Staff ID or Email</label>
        <input class="form-input" type="text" name="userid" placeholder="e.g. DID-0001" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="form-btn">Login →</button>
    </form>
    <p class="form-footer"><a href="../public/login.html">← Patient Login</a></p>
  </div>
</div>
</body>
</html>
