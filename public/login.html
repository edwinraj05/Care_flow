<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CareFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="center">
  <div class="form-card">
    <div style="font-size:32px;margin-bottom:12px">🏥</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your patient account</p>

    <div id="err-box" style="display:none;background:#fee2e2;color:#b91c1c;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;">
      Invalid credentials. Please try again.
    </div>

    <form action="../auth/login.php" method="POST">
      <input type="hidden" name="role" value="patient">
      <div class="form-group">
        <label class="form-label">Email or Patient ID</label>
        <input class="form-input" type="text" name="userid" placeholder="e.g. PID-0042 or email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="form-btn">Login →</button>
    </form>
    <p class="form-footer">Don't have an account? <a href="signup.html">Register here</a></p>
    <p class="form-footer" style="margin-top:8px"><a href="../staff/login.html">Staff Login →</a></p>
  </div>
</div>
<script>
  // Show error if redirected back with ?error=1
  if (new URLSearchParams(window.location.search).get('error')) {
    document.getElementById('err-box').style.display = 'block';
  }
</script>
</body>
</html>
